<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Notes — Register</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f1116,#161a22);
  color:white;
  position:relative;
}

/* background glow */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#ffd84d33,transparent 70%);
  filter:blur(80px);
  top:-100px;
  left:-100px;
}

/* container */
.container{
  display:flex;
  align-items:center;
  gap:60px;
}

/* branding */
.brand{
  max-width:320px;
}

.brand h1{
  font-size:38px;
  letter-spacing:-1px;
}

.brand span{
  color:#ffd84d;
}

.brand p{
  margin-top:14px;
  color:#9aa0b3;
  line-height:1.5;
}

/* card */
.card{
  width:340px;          /* igual que login */
  padding:36px;          /* igual que login */
  border-radius:18px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:0 20px 60px rgba(0,0,0,.5);

  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  background:rgba(255,255,255,0.07);
}

/* title */
.card h2{
  margin-bottom:6px;
  font-size:22px;
}

.sub{
  color:#9aa0b3;
  font-size:14px;
  margin-bottom:24px;
}

/* inputs */
.field{
  margin-bottom:16px;
}

input{
  width:100%;
  padding:11px 12px;

  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);

  background:rgba(255,255,255,0.04);
  color:white;

  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#ffd84d;
  box-shadow:0 0 0 2px rgba(255,216,77,.2);
}

/* button */
button{
  width:100%;
  margin-top:6px;
  padding:12px;

  border:none;
  border-radius:10px;

  background:#ffd84d;
  color:#111;
  font-weight:600;

  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#ffe066;
}

/* footer */
.footer{
  margin-top:18px;
  font-size:13px;
  text-align:center;
  color:#9aa0b3;
}

.footer a{
  color:#ffd84d;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="brand">
  <h1>Secure <span>Notes</span></h1>
  <p>
    Private notes stored safely.
    Access your encrypted workspace and keep your ideas protected.
  </p>
</div>

<div class="card">

<h2>Register</h2>
<div class="sub">Create your account</div>

<form>

  <div class="field">
    <input type="text" placeholder="Full Name" required>
  </div>

  <div class="field">
    <input type="email" placeholder="Email" required>
  </div>

  <div class="field">
    <input type="password" placeholder="Password" required>
  </div>

  <button type="submit">Sign Up</button>

</form>

<div class="footer">
Already have an account? <a href="login.html">Sign In</a>
</div>

</div>

</div>

</body>
</html>
